services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: deimos
      POSTGRES_USER: deimos
      POSTGRES_PASSWORD: deimos
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deimos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
